version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 2
    labels:
      - "kind/dependencies"
      - "bot"
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      codeql-actions:
        patterns:
          - "github/codeql-action/*"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 2
    labels:
      - "kind/dependencies"
      - "bot"
